<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#B07A3A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#B07A3A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8A6030"/>
      <stop offset="100%" stop-color="#C9903E"/>
    </linearGradient>
    <clipPath id="chartClip">
      <rect x="40" y="40" width="380" height="280"/>
    </clipPath>
    <style>
      @keyframes drawLine {
        from { stroke-dashoffset: 700; }
        to   { stroke-dashoffset: 0; }
      }
      @keyframes fillArea {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes nodeIn {
        0%   { r: 0; opacity: 0; }
        60%  { r: 7; opacity: 1; }
        100% { r: 5; opacity: 1; }
      }
      @keyframes ringPulse {
        0%,100% { r: 8;  opacity: 0.35; }
        50%     { r: 14; opacity: 0.08; }
      }
      @keyframes edgeFlow {
        to { stroke-dashoffset: -20; }
      }
      @keyframes candleRise {
        from { transform: scaleY(0); }
        to   { transform: scaleY(1); }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .chart-line {
        stroke-dasharray: 700;
        stroke-dashoffset: 700;
        animation: drawLine 1.8s cubic-bezier(0.4,0,0.2,1) 0.3s forwards;
      }
      .chart-area {
        opacity: 0;
        animation: fillArea 0.8s ease 1.8s forwards;
      }
      .node-dot { r: 0; opacity: 0; }
      .n1 { animation: nodeIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 2.2s forwards; }
      .n2 { animation: nodeIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 2.5s forwards; }
      .n3 { animation: nodeIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 2.8s forwards; }
      .n4 { animation: nodeIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 3.1s forwards; }
      .n5 { animation: nodeIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 3.4s forwards; }

      .pulse-ring {
        animation: ringPulse 2.4s ease-in-out 3.6s infinite;
        r: 8; opacity: 0;
      }
      .edge {
        stroke-dasharray: 6 5;
        stroke-dashoffset: 0;
        opacity: 0;
        animation: edgeFlow 1.4s linear 3.2s infinite, fadeUp 0.4s ease 3.2s forwards;
      }
      .candle { transform-origin: bottom center; transform: scaleY(0); }
      .c1 { animation: candleRise 0.4s ease 0.4s forwards; }
      .c2 { animation: candleRise 0.4s ease 0.6s forwards; }
      .c3 { animation: candleRise 0.4s ease 0.8s forwards; }
      .c4 { animation: candleRise 0.4s ease 1.0s forwards; }
      .c5 { animation: candleRise 0.4s ease 1.2s forwards; }
      .c6 { animation: candleRise 0.4s ease 1.4s forwards; }
      .c7 { animation: candleRise 0.4s ease 1.6s forwards; }
      .label-fade  { opacity: 0; animation: fadeUp 0.5s ease 2.0s forwards; }
      .label-fade2 { opacity: 0; animation: fadeUp 0.5s ease 3.6s forwards; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="680" height="380" rx="24" fill="#F5EFE3"/>

  <!-- 背景格線 -->
  <g stroke="#7A5828" stroke-width="0.5" stroke-opacity="0.1">
    <line x1="40"  y1="100" x2="420" y2="100"/>
    <line x1="40"  y1="160" x2="420" y2="160"/>
    <line x1="40"  y1="220" x2="420" y2="220"/>
    <line x1="40"  y1="280" x2="420" y2="280"/>
    <line x1="100" y1="40"  x2="100" y2="320"/>
    <line x1="160" y1="40"  x2="160" y2="320"/>
    <line x1="220" y1="40"  x2="220" y2="320"/>
    <line x1="280" y1="40"  x2="280" y2="320"/>
    <line x1="340" y1="40"  x2="340" y2="320"/>
    <line x1="400" y1="40"  x2="400" y2="320"/>
  </g>

  <!-- Y軸ラベル -->
  <g class="label-fade" font-family="Georgia, serif" font-size="11" fill="#9A7040" text-anchor="end">
    <text x="36" y="104">300</text>
    <text x="36" y="164">200</text>
    <text x="36" y="224">100</text>
    <text x="36" y="284">0</text>
  </g>

  <!-- ローソク足 -->
  <g clip-path="url(#chartClip)" opacity="0.55">
    <g class="candle c1"><rect x="56"  y="240" width="8" height="40" rx="2" fill="#C49040" opacity="0.5"/><line x1="60"  y1="235" x2="60"  y2="240" stroke="#C49040" stroke-width="1.2"/><line x1="60"  y1="280" x2="60"  y2="285" stroke="#C49040" stroke-width="1.2"/></g>
    <g class="candle c2"><rect x="96"  y="210" width="8" height="55" rx="2" fill="#B07A3A" opacity="0.5"/><line x1="100" y1="205" x2="100" y2="210" stroke="#B07A3A" stroke-width="1.2"/><line x1="100" y1="265" x2="100" y2="272" stroke="#B07A3A" stroke-width="1.2"/></g>
    <g class="candle c3"><rect x="156" y="225" width="8" height="45" rx="2" fill="#C49040" opacity="0.5"/><line x1="160" y1="220" x2="160" y2="225" stroke="#C49040" stroke-width="1.2"/><line x1="160" y1="270" x2="160" y2="276" stroke="#C49040" stroke-width="1.2"/></g>
    <g class="candle c4"><rect x="216" y="175" width="8" height="60" rx="2" fill="#B07A3A" opacity="0.5"/><line x1="220" y1="170" x2="220" y2="175" stroke="#B07A3A" stroke-width="1.2"/><line x1="220" y1="235" x2="220" y2="242" stroke="#B07A3A" stroke-width="1.2"/></g>
    <g class="candle c5"><rect x="276" y="150" width="8" height="55" rx="2" fill="#C49040" opacity="0.5"/><line x1="280" y1="144" x2="280" y2="150" stroke="#C49040" stroke-width="1.2"/><line x1="280" y1="205" x2="280" y2="212" stroke="#C49040" stroke-width="1.2"/></g>
    <g class="candle c6"><rect x="336" y="115" width="8" height="50" rx="2" fill="#B07A3A" opacity="0.5"/><line x1="340" y1="108" x2="340" y2="115" stroke="#B07A3A" stroke-width="1.2"/><line x1="340" y1="165" x2="340" y2="172" stroke="#B07A3A" stroke-width="1.2"/></g>
    <g class="candle c7"><rect x="396" y="85"  width="8" height="45" rx="2" fill="#9A6830" opacity="0.6"/><line x1="400" y1="78"  x2="400" y2="85"  stroke="#9A6830" stroke-width="1.2"/><line x1="400" y1="130" x2="400" y2="136" stroke="#9A6830" stroke-width="1.2"/></g>
  </g>

  <!-- 折線エリア -->
  <path class="chart-area"
    d="M50 278 L100 248 L150 262 L200 218 L250 195 L310 165 L370 130 L415 95 L415 320 L50 320Z"
    fill="url(#areaGrad)" clip-path="url(#chartClip)"/>

  <!-- 折線メイン -->
  <path class="chart-line"
    d="M50 278 L100 248 L150 262 L200 218 L250 195 L310 165 L370 130 L415 95"
    fill="none" stroke="url(#lineGrad)" stroke-width="2.8"
    stroke-linejoin="round" stroke-linecap="round"
    clip-path="url(#chartClip)"/>

  <!-- 頂点マーカー -->
  <circle cx="415" cy="95" r="5" fill="#F5EFE3" stroke="#B07A3A" stroke-width="2.2"/>
  <circle class="pulse-ring" cx="415" cy="95" fill="none" stroke="#B07A3A" stroke-width="1"/>

  <!-- 右パネル -->
  <rect x="460" y="40" width="200" height="280" rx="16"
        fill="#EDE4D3" stroke="#C4A87A" stroke-width="1" stroke-opacity="0.6"/>

  <text class="label-fade2" x="560" y="72"
        font-family="Georgia, serif" font-size="11"
        fill="#8A6030" text-anchor="middle" letter-spacing="1.5">AI ANALYSIS</text>

  <!-- エッジ -->
  <line class="edge" x1="510" y1="130" x2="545" y2="160" stroke="#9A6830" stroke-width="1"/>
  <line class="edge" x1="510" y1="160" x2="545" y2="160" stroke="#9A6830" stroke-width="1"/>
  <line class="edge" x1="510" y1="190" x2="545" y2="160" stroke="#9A6830" stroke-width="1"/>
  <line class="edge" x1="510" y1="130" x2="545" y2="200" stroke="#9A6830" stroke-width="1"/>
  <line class="edge" x1="510" y1="160" x2="545" y2="200" stroke="#9A6830" stroke-width="1"/>
  <line class="edge" x1="510" y1="190" x2="545" y2="200" stroke="#9A6830" stroke-width="1"/>
  <line class="edge" x1="557" y1="160" x2="592" y2="175" stroke="#9A6830" stroke-width="1.2"/>
  <line class="edge" x1="557" y1="200" x2="592" y2="175" stroke="#9A6830" stroke-width="1.2"/>

  <!-- ノード Layer 1 -->
  <circle class="node-dot n1" cx="510" cy="130" fill="#EDE4D3" stroke="#B07A3A" stroke-width="2"/>
  <circle class="node-dot n2" cx="510" cy="160" fill="#EDE4D3" stroke="#B07A3A" stroke-width="2"/>
  <circle class="node-dot n3" cx="510" cy="190" fill="#EDE4D3" stroke="#B07A3A" stroke-width="2"/>

  <!-- ノード Layer 2 -->
  <circle class="node-dot n4" cx="545" cy="160" fill="#EDE4D3" stroke="#9A6830" stroke-width="1.8"/>
  <circle class="node-dot n4" cx="545" cy="200" fill="#EDE4D3" stroke="#9A6830" stroke-width="1.8"/>

  <!-- Output ノード -->
  <circle class="node-dot n5" cx="592" cy="175" fill="#B07A3A" stroke="#8A6030" stroke-width="1.5"/>

  <!-- 予測ラベル -->
  <text class="label-fade2" x="612" y="172" font-family="Georgia, serif" font-size="10" fill="#8A6030">+12.4%</text>
  <text class="label-fade2" x="612" y="184" font-family="Georgia, serif" font-size="9" fill="#B07A3A" opacity="0.7">predicted</text>

  <!-- ミニバー -->
  <g class="label-fade2" opacity="0.6">
    <rect x="472" y="240" width="14" height="30" rx="2" fill="#C49040" opacity="0.6"/>
    <rect x="491" y="252" width="14" height="18" rx="2" fill="#B07A3A" opacity="0.6"/>
    <rect x="510" y="245" width="14" height="25" rx="2" fill="#C49040" opacity="0.6"/>
    <rect x="529" y="248" width="14" height="22" rx="2" fill="#9A6830" opacity="0.6"/>
    <rect x="548" y="238" width="14" height="32" rx="2" fill="#C49040" opacity="0.7"/>
    <text x="472" y="284" font-family="Georgia, serif" font-size="9" fill="#9A7040">Input signals</text>
  </g>

  <!-- 月ラベル -->
  <g class="label-fade" font-family="Georgia, serif" font-size="10" fill="#9A7040" text-anchor="middle">
    <text x="60"  y="334">Jan</text>
    <text x="110" y="334">Feb</text>
    <text x="160" y="334">Mar</text>
    <text x="220" y="334">Apr</text>
    <text x="280" y="334">May</text>
    <text x="340" y="334">Jun</text>
    <text x="400" y="334">Jul</text>
  </g>

  <!-- ブランドタグ -->
  <text class="label-fade2" x="560" y="345"
        font-family="Georgia, serif" font-size="10"
        fill="#B07A3A" text-anchor="middle" letter-spacing="1">AI PORTFOLIO MANAGER</text>
</svg>
